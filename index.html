<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <!-- FOUC 방지: 테마 먼저 적용 -->
  <script>
    const theme = localStorage.getItem('uig-theme');
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const appliedTheme = theme || (systemDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', appliedTheme);
  </script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="순수 HTML/CSS/ES6 기반 한국형 웹접근성(KWCAG 2.2) 준수 UI 컴포넌트 가이드">
  <title>Web UI Component Guide</title>

  <!-- CSS 로드 (로드 순서: tokens → reset → layout → components) -->
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/code-block.css">
  <link rel="stylesheet" href="assets/css/dashboard.css">
  <!-- 대시보드 페이지 전용: 그리드 레이아웃 + 반응형 + 카드 상태 스타일 -->
  <link rel="stylesheet" href="assets/css/pages/dashboard.css">
  <link rel="stylesheet" href="assets/css/components/button.css">
  <link rel="stylesheet" href="assets/css/components/input.css">
  <link rel="stylesheet" href="assets/css/components/checkbox.css">
  <link rel="stylesheet" href="assets/css/components/radio.css">
  <link rel="stylesheet" href="assets/css/components/switch.css">
  <link rel="stylesheet" href="assets/css/components/select.css">
  <link rel="stylesheet" href="assets/css/components/textarea.css">
  <link rel="stylesheet" href="assets/css/components/card.css">
  <link rel="stylesheet" href="assets/css/components/accordion.css">
  <link rel="stylesheet" href="assets/css/components/tabs.css">
  <link rel="stylesheet" href="assets/css/components/modal.css">
  <link rel="stylesheet" href="assets/css/components/dropdown.css">
  <link rel="stylesheet" href="assets/css/components/toast.css">
  <link rel="stylesheet" href="assets/css/components/alert.css">
  <link rel="stylesheet" href="assets/css/components/badge.css">
  <link rel="stylesheet" href="assets/css/components/tooltip.css">
  <link rel="stylesheet" href="assets/css/components/progress.css">
  <link rel="stylesheet" href="assets/css/components/skeleton.css">
</head>
<body>
  <!-- 접근성: 건너뛰기 링크 -->
  <a href="#main" class="skip-nav">본문으로 이동</a>

  <!-- 헤더 -->
  <header class="header">
    <div class="header-container">
      <!-- 로고 및 가이드명 -->
      <div class="header-brand">
        <a href="#/" class="logo">UI</a>
        <h1 class="guide-title">Web UI Component Guide</h1>
      </div>

      <!-- 공간 차등 배치 -->
      <div class="header-spacer"></div>

      <!-- 버전 배지 -->
      <span class="version-badge">v1.0</span>

      <!-- 테마 토글 버튼 -->
      <button class="theme-toggle" id="theme-toggle" aria-label="테마 전환" aria-expanded="false">
        <i data-lucide="moon" class="icon-dark"></i>
        <i data-lucide="sun" class="icon-light"></i>
      </button>

      <!-- GitHub 링크 -->
      <a href="https://github.com" class="github-link" target="_blank" rel="noopener noreferrer" aria-label="GitHub로 이동">
        <i data-lucide="github"></i>

    </div>
  </header>

  <!-- 메인 컨테이너 -->
  <div class="main-container">
    <!-- 사이드바 -->
    <aside class="sidebar">
      <nav class="sidebar-nav">

        <div class="nav-section">

            <li><a href="#/checkbox" class="nav-link">Checkbox</a></li>
            <li><a href="#/radio" class="nav-link">Radio</a></li>
            <li><a href="#/switch" class="nav-link">Switch</a></li>
            <li><a href="#/select" class="nav-link">Select</a></li>
            <li><a href="#/textarea" class="nav-link">Textarea</a></li>
          </ul>
        </div>

        <!-- 레이아웃 -->
        <div class="nav-section">
          <h2 class="nav-section-title">레이아웃</h2>
          <ul class="nav-list">
            <li><a href="#/card" class="nav-link">Card</a></li>
            <li><a href="#/accordion" class="nav-link">Accordion</a></li>
            <li><a href="#/tabs" class="nav-link">Tabs</a></li>
            <li><a href="#/modal" class="nav-link">Modal</a></li>
            <li><a href="#/dropdown" class="nav-link">Dropdown</a></li>
          </ul>
        </div>

        <!-- 피드백 -->
        <div class="nav-section">
          <h2 class="nav-section-title">피드백</h2>
          <ul class="nav-list">
            <li><a href="#/toast" class="nav-link">Toast</a></li>
            <li><a href="#/alert" class="nav-link">Alert</a></li>
            <li><a href="#/badge" class="nav-link">Badge</a></li>
            <li><a href="#/tooltip" class="nav-link">Tooltip</a></li>
            <li><a href="#/progress" class="nav-link">Progress</a></li>
            <li><a href="#/skeleton" class="nav-link">Skeleton</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main id="main" class="main">
      <div id="app-content">
        <!-- 라우터에 의해 페이지 렌더링됨 -->
      </div>
    </main>
  </div>

  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <!-- ES6 모듈 진입점 -->
  <script type="module" src="assets/js/App.js"></script>
</body>
</html>
